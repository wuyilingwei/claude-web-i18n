name: Update original Claude locale files

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: update-original-locales
  cancel-in-progress: true

env:
  BRANCH_PREFIX: bot/update-original-locales-
  MAIN_SOURCE_URL: https://claude.ai/i18n/en-US.json
  STATSIG_SOURCE_URL: https://claude.ai/i18n/statsig/en-US.json
  FETCH_MAX_ATTEMPTS: "5"
  FETCH_INITIAL_BACKOFF_SECONDS: "5"
  FETCH_BACKOFF_MULTIPLIER: "2"
  FETCH_JITTER_SECONDS: "1"

jobs:
  update:
    name: Check upstream locale files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install fetch dependency
        shell: bash
        run: python3 -m pip install --quiet curl_cffi

      - name: Fetch upstream files
        id: fetch
        shell: bash
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          if python3 - "$MAIN_SOURCE_URL" "$tmp_dir/en-US.json" "$STATSIG_SOURCE_URL" "$tmp_dir/en-US.statsig.json" <<'PY'
          import sys
          import os
          import random
          import time
          from curl_cffi import requests

          RETRYABLE_STATUS_CODES = {403, 429, 500, 502, 503, 504}
          BLOCKING_STATUS_CODES = {403, 429}
          MAX_ATTEMPTS = int(os.environ.get("FETCH_MAX_ATTEMPTS", "5"))
          INITIAL_BACKOFF_SECONDS = float(os.environ.get("FETCH_INITIAL_BACKOFF_SECONDS", "5"))
          BACKOFF_MULTIPLIER = float(os.environ.get("FETCH_BACKOFF_MULTIPLIER", "2"))
          JITTER_SECONDS = float(os.environ.get("FETCH_JITTER_SECONDS", "1"))
          SKIP_EXIT_CODE = 42

          headers = {
              "accept": "application/json,text/plain,*/*",
              "accept-language": "en-US,en;q=0.9",
              "referer": "https://claude.ai/",
          }

          sources = [
              (sys.argv[1], sys.argv[2]),
              (sys.argv[3], sys.argv[4]),
          ]

          def backoff_seconds(attempt):
              base = INITIAL_BACKOFF_SECONDS * (BACKOFF_MULTIPLIER ** max(attempt - 1, 0))
              return base + random.uniform(0, JITTER_SECONDS)

          def body_preview(response):
              try:
                  text = response.text.strip()
              except Exception:
                  return ""

              text = " ".join(text.split())
              return text[:300]

          for url, output in sources:
              last_response = None
              last_error = None

              for attempt in range(1, MAX_ATTEMPTS + 1):
                  try:
                      response = requests.get(
                          url,
                          headers=headers,
                          impersonate="chrome",
                          timeout=60,
                      )
                      last_response = response

                      if response.status_code < 400:
                          content = response.content
                          if not content.lstrip().startswith((b"{", b"[")):
                              raise SystemExit(f"Fetched response from {url} does not look like JSON.")

                          with open(output, "wb") as file:
                              file.write(content)
                          break

                      if response.status_code in RETRYABLE_STATUS_CODES and attempt < MAX_ATTEMPTS:
                          delay = backoff_seconds(attempt)
                          print(
                              f"[retry] {url} returned HTTP {response.status_code} on attempt "
                              f"{attempt}/{MAX_ATTEMPTS}; sleeping {delay:.1f}s before retry."
                          )
                          time.sleep(delay)
                          continue

                      if response.status_code in BLOCKING_STATUS_CODES:
                          preview = body_preview(response)
                          print(
                              f"::warning::Skipping upstream locale refresh because {url} still returned "
                              f"HTTP {response.status_code} after {MAX_ATTEMPTS} attempts."
                          )
                          if preview:
                              print(f"::warning::Response preview: {preview}")
                          raise SystemExit(SKIP_EXIT_CODE)

                      response.raise_for_status()
                  except SystemExit:
                      raise
                  except Exception as error:
                      last_error = error
                      if attempt < MAX_ATTEMPTS:
                          delay = backoff_seconds(attempt)
                          print(
                              f"[retry] {url} failed on attempt {attempt}/{MAX_ATTEMPTS}: {error}. "
                              f"Sleeping {delay:.1f}s before retry."
                          )
                          time.sleep(delay)
                          continue
                      raise

              else:
                  if last_response is not None:
                      last_response.raise_for_status()
                  if last_error is not None:
                      raise last_error
                  raise SystemExit(f"Failed to fetch {url} for an unknown reason.")
          PY
          then
            :
          else
            status="$?"
            if [ "$status" -eq 42 ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "skipped_due_to_upstream_block=true" >> "$GITHUB_OUTPUT"
              echo "Upstream blocked automated fetches after retries; skipping this run."
              exit 0
            fi
            exit "$status"
          fi

          if cmp --silent "$tmp_dir/en-US.json" .original/en-US.json \
            && cmp --silent "$tmp_dir/en-US.statsig.json" .original/en-US.statsig.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Upstream files match the repository copies."
            exit 0
          fi

          cp "$tmp_dir/en-US.json" .original/en-US.json
          cp "$tmp_dir/en-US.statsig.json" .original/en-US.statsig.json

          echo "changed=true" >> "$GITHUB_OUTPUT"
          {
            echo "changed_files<<EOF"
            git diff --name-only -- .original/en-US.json .original/en-US.statsig.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create update branch and commit
        if: steps.fetch.outputs.changed == 'true'
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          branch_name="${BRANCH_PREFIX}${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$branch_name"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .original/en-US.json .original/en-US.statsig.json
          git commit -m "chore: update original Claude locale files"
          git push --set-upstream origin "$branch_name"

          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

      - name: Open latest pull request
        if: steps.fetch.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ steps.commit.outputs.branch_name }}
          CHANGED_FILES: ${{ steps.fetch.outputs.changed_files }}
        shell: bash
        run: |
          set -euo pipefail

          body_file="$(mktemp)"
          {
            echo "Automated update for upstream Claude locale source files."
            echo
            echo "Sources:"
            echo "- $MAIN_SOURCE_URL"
            echo "- $STATSIG_SOURCE_URL"
            echo
            echo "Changed files:"
            while IFS= read -r file; do
              [ -n "$file" ] && echo "- \`$file\`"
            done <<< "$CHANGED_FILES"
          } > "$body_file"

          pr_url="$(gh pr create \
            --base "$GITHUB_REF_NAME" \
            --head "$BRANCH_NAME" \
            --title "chore: update original Claude locale files" \
            --body-file "$body_file")"

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "Created $pr_url"

      - name: Close superseded update pull requests and branches
        if: steps.fetch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ steps.commit.outputs.branch_name }}
        shell: bash
        run: |
          set -euo pipefail

          gh pr list --state open --limit 100 --json number,headRefName \
            | jq --raw-output \
              --arg branch "$BRANCH_NAME" \
              --arg prefix "$BRANCH_PREFIX" \
              '.[] | select(.headRefName | startswith($prefix)) | select(.headRefName != $branch) | .number' \
            | while IFS= read -r pr_number; do
                [ -z "$pr_number" ] && continue
                gh pr close "$pr_number" \
                  --comment "Closing this superseded automated update because a newer upstream snapshot is available." \
                  --delete-branch
              done

          git ls-remote --heads origin "${BRANCH_PREFIX}*" \
            | awk '{print $2}' \
            | sed 's#^refs/heads/##' \
            | while IFS= read -r branch; do
                [ -z "$branch" ] && continue
                [ "$branch" = "$BRANCH_NAME" ] && continue
                git push origin --delete "$branch" || true
              done
